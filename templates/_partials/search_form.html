{# Reusable search bar. Set form_compact=True for the results page. #}
<form action="{{ form_action }}" method="{{ form_method or 'get' }}"
      class="search-form{% if form_compact %} compact{% endif %}"
      role="search" aria-label="Site search">
  <label class="field" for="q">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
      <path d="m20 20-3.5-3.5" stroke="currentColor"
            stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input
      type="text"
      id="q"
      name="q"
      value="{{ query or '' }}"
      placeholder='Search the index — try "machine learning" or +bm25 -neural'
      autocomplete="off"
      autofocus
      spellcheck="false">
    <div id="autocomplete-dropdown" class="autocomplete-dropdown" style="display:none;"></div>
  </label>
  <select name="model" aria-label="Ranking model">
    {% for m in available_models %}
      <option value="{{ m }}"
              {% if m == (current_model or model) %}selected{% endif %}>
        {{ m | upper }}
      </option>
    {% endfor %}
    <option value="semantic">SEMANTIC</option>
  </select>
  <button class="btn btn-primary" type="submit">Search</button>
</form>

<script>
(function() {
  const searchInput = document.getElementById('q');
  const dropdown = document.getElementById('autocomplete-dropdown');
  let debounceTimer;

  if (!searchInput) return;

  searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    const query = this.value;

    if (query.length < 2) {
      dropdown.style.display = 'none';
      return;
    }

    debounceTimer = setTimeout(() => {
      fetch(`/api/autocomplete?prefix=${encodeURIComponent(query)}`)
        .then(res => res.json())
        .then(data => {
          if (data.suggestions && data.suggestions.length > 0) {
            dropdown.innerHTML = data.suggestions
              .map(s => `<div class="autocomplete-item" data-value="${s}">${s}</div>`)
              .join('');
            dropdown.style.display = 'block';
          } else {
            dropdown.style.display = 'none';
          }
        })
        .catch(() => dropdown.style.display = 'none');
    }, 300);
  });

  dropdown.addEventListener('click', function(e) {
    if (e.target.classList.contains('autocomplete-item')) {
      searchInput.value = e.target.dataset.value;
      dropdown.style.display = 'none';
    }
  });

  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });
})();
</script>
