<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" width="760" height="720"
     font-family="'Times New Roman', Times, serif" font-size="12" fill="#000">
  <defs>
    <marker id="open" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L12,6 L0,12" fill="none" stroke="#000" stroke-width="1.2"/>
    </marker>
    <style>
      .lbl    { text-anchor: middle; }
      .cls    { fill: #fff; stroke: #000; stroke-width: 1.4; }
      .header { font-weight: 700; }
      .sep    { stroke: #000; stroke-width: 1; }
      .edge   { stroke: #000; stroke-width: 1.2; fill: none; }
      .role   { font-style: italic; font-size: 11px; fill: #333; }
    </style>
  </defs>

  <text x="380" y="26" class="lbl" font-size="16" font-weight="700">Figure 4. Class diagram (UML, simplified)</text>
  <text x="380" y="44" class="lbl" font-size="11" fill="#333">Core types of the engine and their associations</text>

  <!-- SearchEngine -->
  <g>
    <rect x="280" y="76" width="200" height="160" class="cls"/>
    <text x="380" y="96"  class="lbl header">SearchEngine</text>
    <line class="sep" x1="280" y1="106" x2="480" y2="106"/>
    <text x="290" y="124">- index : InvertedIndex</text>
    <text x="290" y="140">- ranker : Ranker</text>
    <text x="290" y="156">- query_processor : QueryProcessor</text>
    <text x="290" y="172">- snippet : SnippetGenerator</text>
    <line class="sep" x1="280" y1="184" x2="480" y2="184"/>
    <text x="290" y="200">+ search(q, top_k) : SearchResult[]</text>
    <text x="290" y="216">+ suggest_query(q) : str</text>
    <text x="290" y="232">+ save(path) / load(path)</text>
  </g>

  <!-- InvertedIndex -->
  <g>
    <rect x="20" y="280" width="200" height="138" class="cls"/>
    <text x="120" y="300" class="lbl header">InvertedIndex</text>
    <line class="sep" x1="20" y1="310" x2="220" y2="310"/>
    <text x="30" y="328">- postings : dict</text>
    <text x="30" y="344">- doc_lengths : dict</text>
    <text x="30" y="360">- term_doc_count : dict</text>
    <line class="sep" x1="20" y1="372" x2="220" y2="372"/>
    <text x="30" y="388">+ add_document(d)</text>
    <text x="30" y="404">+ postings(t) / doc_frequency(t)</text>
  </g>

  <!-- Ranker -->
  <g>
    <rect x="280" y="280" width="200" height="118" class="cls"/>
    <text x="380" y="300" class="lbl header">Ranker</text>
    <line class="sep" x1="280" y1="310" x2="480" y2="310"/>
    <text x="290" y="328">- model_name : str</text>
    <line class="sep" x1="280" y1="340" x2="480" y2="340"/>
    <text x="290" y="356">+ rank(query_terms)</text>
    <text x="290" y="372">+ use_model(name)</text>
    <text x="290" y="388">+ explain(terms, doc_id)</text>
  </g>

  <!-- QueryProcessor -->
  <g>
    <rect x="540" y="280" width="200" height="118" class="cls"/>
    <text x="640" y="300" class="lbl header">QueryProcessor</text>
    <line class="sep" x1="540" y1="310" x2="740" y2="310"/>
    <text x="550" y="328">- preprocessor : Preprocessor</text>
    <line class="sep" x1="540" y1="340" x2="740" y2="340"/>
    <text x="550" y="356">+ parse(raw) : ParsedQuery</text>
    <text x="550" y="372">  &#x2192; must / phrases / must_not</text>
  </g>

  <!-- TfIdfModel -->
  <g>
    <rect x="100" y="486" width="220" height="120" class="cls"/>
    <text x="210" y="506" class="lbl header">TfIdfModel</text>
    <line class="sep" x1="100" y1="516" x2="320" y2="516"/>
    <text x="110" y="534">- idf : dict[str, float]</text>
    <text x="110" y="550">- doc_vectors : dict[int, dict]</text>
    <line class="sep" x1="100" y1="562" x2="320" y2="562"/>
    <text x="110" y="578">+ score(query_terms)</text>
    <text x="110" y="594">+ vectorize_query(terms)</text>
  </g>

  <!-- BM25Model -->
  <g>
    <rect x="440" y="486" width="220" height="120" class="cls"/>
    <text x="550" y="506" class="lbl header">BM25Model</text>
    <line class="sep" x1="440" y1="516" x2="660" y2="516"/>
    <text x="450" y="534">- k1 : float = 1.5</text>
    <text x="450" y="550">- b : float = 0.75</text>
    <line class="sep" x1="440" y1="562" x2="660" y2="562"/>
    <text x="450" y="578">+ score(query_terms)</text>
    <text x="450" y="594">+ explain(term, doc_id)</text>
  </g>

  <!-- Edges: SearchEngine -> components -->
  <path class="edge" d="M310,236 L120,280" marker-end="url(#open)"/>
  <text x="190" y="262" class="role">indexes via</text>

  <path class="edge" d="M380,236 L380,280" marker-end="url(#open)"/>
  <text x="395" y="262" class="role">ranks via</text>

  <path class="edge" d="M450,236 L640,280" marker-end="url(#open)"/>
  <text x="560" y="262" class="role">parses via</text>

  <!-- Edges: Ranker -> models -->
  <path class="edge" d="M340,398 L210,486" marker-end="url(#open)"/>
  <text x="240" y="450" class="role">delegates to</text>

  <path class="edge" d="M420,398 L550,486" marker-end="url(#open)"/>
  <text x="495" y="450" class="role">delegates to</text>

  <!-- Edges: models -> InvertedIndex -->
  <path class="edge" d="M150,486 L150,418" marker-end="url(#open)"/>
  <text x="155" y="450" class="role">reads</text>
  <path class="edge" d="M540,486 L220,418" marker-end="url(#open)"/>
  <text x="380" y="465" class="role">reads</text>

  <text x="380" y="660" class="lbl" font-size="11" fill="#333">
    Hollow-headed arrows denote a directional association ("uses").
  </text>
  <text x="380" y="676" class="lbl" font-size="11" fill="#333">
    Compartments: name | attributes | operations.
  </text>
</svg>
