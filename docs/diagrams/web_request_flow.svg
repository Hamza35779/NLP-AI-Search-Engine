<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460"
     font-family="'Times New Roman', Times, serif" font-size="13" fill="#000">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
    <style>
      .lbl  { text-anchor: middle; }
      .box  { fill: #fff; stroke: #000; stroke-width: 1.4; }
      .face { fill: #fff; stroke: #000; stroke-width: 2; }
      .edge { stroke: #000; stroke-width: 1.2; fill: none; }
      .lab  { font-style: italic; font-size: 11px; fill: #333; }
    </style>
  </defs>

  <text x="380" y="26" class="lbl" font-size="16" font-weight="700">Figure 5. Web request flow</text>
  <text x="380" y="44" class="lbl" font-size="11" fill="#333">HTML pages and JSON endpoints share the same engine instance</text>

  <!-- Clients -->
  <rect x="40"  y="86"  width="140" height="50" class="box"/>
  <text x="110" y="110" class="lbl">Browser</text>
  <text x="110" y="126" class="lbl" font-size="11" fill="#444">HTML client</text>

  <rect x="40"  y="276" width="140" height="50" class="box"/>
  <text x="110" y="300" class="lbl">HTTP client</text>
  <text x="110" y="316" class="lbl" font-size="11" fill="#444">JSON consumer</text>

  <!-- Flask app -->
  <rect x="280" y="180" width="180" height="60" class="face"/>
  <text x="370" y="206" class="lbl" font-weight="700">Flask app.py</text>
  <text x="370" y="224" class="lbl" font-size="11">routes &amp; templates</text>

  <!-- Engine -->
  <rect x="540" y="180" width="180" height="60" class="face"/>
  <text x="630" y="204" class="lbl" font-weight="700">SearchEngine</text>
  <text x="630" y="222" class="lbl" font-size="11">in-memory facade</text>

  <!-- HTML route -->
  <text x="220" y="100" class="lab">GET /search?q=...</text>
  <path class="edge" d="M180,111 L280,200" marker-end="url(#arrow2)"/>

  <text x="500" y="170" class="lab">.search(q)</text>
  <path class="edge" d="M460,200 L540,200" marker-end="url(#arrow2)"/>

  <text x="500" y="252" class="lab">SearchResult[]</text>
  <path class="edge" d="M540,222 L460,222" marker-end="url(#arrow2)"/>

  <text x="220" y="156" class="lab">render results.html</text>
  <path class="edge" d="M280,222 L180,135" marker-end="url(#arrow2)"/>

  <!-- JSON route -->
  <text x="220" y="354" class="lab">GET /api/search?q=...</text>
  <path class="edge" d="M180,300 L280,228" marker-end="url(#arrow2)"/>

  <text x="220" y="380" class="lab">jsonify({ results, suggestion })</text>
  <path class="edge" d="M280,238 L180,310" marker-end="url(#arrow2)"/>

  <!-- /healthz -->
  <rect x="280" y="300" width="180" height="40" class="box"/>
  <text x="370" y="325" class="lbl">GET /healthz</text>
  <path class="edge" d="M460,320 L540,232" marker-end="url(#arrow2)"/>
  <text x="500" y="290" class="lab">read engine.stats()</text>

  <!-- Stats -->
  <rect x="280" y="360" width="180" height="40" class="box"/>
  <text x="370" y="385" class="lbl">GET /api/stats</text>
  <path class="edge" d="M460,376 L540,234" marker-end="url(#arrow2)"/>

  <text x="380" y="430" class="lbl" font-size="11" fill="#333">All routes are read-only; the engine is built once at process start.</text>
</svg>
